name: Security and tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock.txt
      - name: Install exact hash-locked audit environment
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock.txt
      - name: Verify sealed inventory
        run: python scripts/verify_release.py
      - name: Run local security gate and tests
        run: python scripts/security_check.py --strict
      - name: Undefined-name and syntax analysis
        run: ruff check bot.py public_safety.py kalshi_15m_sell_bot.py scripts tests
      - name: Bandit medium/high findings
        run: bandit -q -r bot.py public_safety.py kalshi_15m_sell_bot.py scripts -ll
      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.lock.txt
      - name: Secret scanner
        shell: bash
        run: |
          detect-secrets scan --all-files \
            --exclude-files '(^\.git/|^\.ruff_cache/|^\.pytest_cache/|^__pycache__/|SBOM\.cdx\.json$|SHA256SUMS\.txt$|MANIFEST\.json$|requirements.*\.lock\.txt$)' \
            > /tmp/secrets.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/secrets.json', encoding='utf-8'))
          results = data.get('results', {})
          if results:
              for path, items in sorted(results.items()):
                  print(path, items)
              raise SystemExit('detect-secrets reported candidates; review and baseline only confirmed false positives')
          print('No detect-secrets candidates')
          PY

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check --require-hashes -r requirements.lock.txt
      - run: python -m unittest discover -s tests -v
      - run: python bot.py status
